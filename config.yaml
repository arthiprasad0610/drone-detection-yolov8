# ============================================================
# SKYGUARD - Drone Detection Configuration
# ============================================================

# -------------------------
# CLASS DEFINITIONS
# -------------------------
classes:
  0: bird
  1: aeroplane
  2: helicopter
  3: drone

num_classes: 4

threat_levels:
  bird: 0
  aeroplane: 1
  helicopter: 1
  drone: 2

# -------------------------
# PATHS
# -------------------------
paths:
  raw_data: data/raw/
  processed_data: data/processed/
  frame_output: outputs/frames/
  results_output: outputs/results/
  model_weights: models/
  logs: outputs/logs/
  detections_txt: outputs/detections/
  captured_frames: captured_datasets/frames/
  captured_labels: captured_datasets/labels/

# -------------------------
# FRAME EXTRACTION
# -------------------------
frame_extraction:
  fps: 3
  resize_width: 640
  resize_height: 640
  quality: 95
  skip_similar: true
  similarity_threshold: 0.95

# -------------------------
# MODEL
# -------------------------
model:
  architecture: yolov8s
  pretrained: true
  input_size: [640, 640]

  confidence_threshold: 0.25
  iou_threshold: 0.45
  max_detections: 100

# -------------------------
# TRAINING
# -------------------------
training:
  epochs: 100
  batch_size: 16
  learning_rate: 0.001
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 20

  device: auto
  workers: 8

  seed: 42
  save_period: 10
  val_split: 0.2

# -------------------------
# DATA AUGMENTATION
# -------------------------
augmentation:
  mosaic: 1.0
  mixup: 0.2
  fliplr: 0.5
  flipud: 0.0

  degrees: 10
  translate: 0.2
  scale: 0.5

  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4

# -------------------------
# INFERENCE
# -------------------------
inference:
  show_display: true
  save_output: true

  output_video: outputs/results/annotated_output.mp4

  alert_on_threat: true
  min_object_size: 15

  track_objects: true
  confidence_smoothing: 0.7

# -------------------------
# SAHI
# -------------------------
sahi:
  enabled: true

  slice_height: 320
  slice_width: 320

  overlap_height_ratio: 0.2
  overlap_width_ratio: 0.2

  postprocess_type: nms
  postprocess_match_metric: ios
  postprocess_match_threshold: 0.5

# -------------------------
# STREAMING
# -------------------------
streaming:
  buffer_size: 30
  display_resolution: [1280,720]
  fps_cap: 30
  bitrate_mbps: 5

# -------------------------
# ALERTS
# -------------------------
alerts:
  enable_sound: true
  enable_logging: true

  critical_actions:
    - log
    - alert

  monitor_actions:
    - log

  sound_file: assets/alert_sound.mp3

# -------------------------
# API
# -------------------------
api:
  host: "0.0.0.0"
  port: 7000
  workers: 4
  reload: false
  log_level: info

# -------------------------
# LOGGING
# -------------------------
logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(message)s"

  log_to_file: true
  log_file: outputs/logs/aerial_classifier.log